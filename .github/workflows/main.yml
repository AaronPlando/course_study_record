name: Build Windows Portable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm config set registry https://registry.npmmirror.com
          npm config set electron_mirror https://npmmirror.com/mirrors/electron/
          $env:ELECTRON_MIRROR = "https://npmmirror.com/mirrors/electron/"
          npm install --foreground-scripts

      - name: Ensure Electron runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:ELECTRON_MIRROR = "https://npmmirror.com/mirrors/electron/"

          if (!(Test-Path "node_modules/electron/path.txt")) {
            Write-Host "Electron runtime is incomplete. Rebuilding electron..."
            npm rebuild electron --foreground-scripts
          }

          if (!(Test-Path "node_modules/electron/path.txt")) {
            Write-Host "Electron runtime is still incomplete. Reinstalling electron..."
            npm install electron@42.3.0 --save-dev --foreground-scripts
          }

          if (!(Test-Path "node_modules/electron/path.txt")) {
            throw "Electron runtime repair failed: node_modules/electron/path.txt still does not exist."
          }

          node -e "console.log('Electron path:', require('electron'))"

      - name: Build portable app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          node build-portable.js

      - name: Compress portable app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "course-study-record-windows-portable.zip") {
            Remove-Item "course-study-record-windows-portable.zip" -Force
          }
          Compress-Archive -Path "dist/win-unpacked/*" -DestinationPath "course-study-record-windows-portable.zip" -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-study-record-windows-portable
          path: course-study-record-windows-portable.zip
