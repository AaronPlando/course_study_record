name: Build Windows Portable

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure npm and Electron mirror
        shell: powershell
        run: |
          npm config delete proxy
          npm config delete https-proxy
          npm config set registry https://registry.npmmirror.com
          npm config set ignore-scripts false
          echo "ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/" >> $env:GITHUB_ENV
          echo "ELECTRON_CUSTOM_DIR={{ version }}" >> $env:GITHUB_ENV

      - name: Install dependencies
        shell: powershell
        run: |
          if (Test-Path "package-lock.json") {
            npm ci --foreground-scripts
          } else {
            npm install --foreground-scripts
          }

      - name: Force install Electron runtime
        shell: powershell
        run: |
          if (!(Test-Path "node_modules/electron/path.txt")) {
            Write-Host "Electron runtime is incomplete. Running Electron install script..."
            node node_modules/electron/install.js
          }
          if (!(Test-Path "node_modules/electron/path.txt")) {
            Write-Host "Electron runtime is still incomplete. Reinstalling electron package..."
            npm uninstall electron
            npm install electron --save-dev --foreground-scripts
          }
          if (!(Test-Path "node_modules/electron/path.txt")) {
            throw "Electron runtime install failed: node_modules/electron/path.txt still does not exist."
          }
          Write-Host "Electron runtime ready."

      - name: Build portable app
        shell: powershell
        run: node build-portable.js

      - name: Compress portable app
        shell: powershell
        run: |
          if (!(Test-Path "dist/win-unpacked")) {
            throw "dist/win-unpacked was not generated."
          }
          if (Test-Path "course-study-record-windows-portable.zip") {
            Remove-Item "course-study-record-windows-portable.zip" -Force
          }
          Compress-Archive -Path "dist/win-unpacked/*" -DestinationPath "course-study-record-windows-portable.zip"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: course-study-record-windows-portable
          path: course-study-record-windows-portable.zip
