        let pointTopButtonTimer = null;
        let cleanupPointTopButtonListeners = null;

        function removePointTopButton() {
            clearTimeout(pointTopButtonTimer);
            pointTopButtonTimer = null;

            if (cleanupPointTopButtonListeners) {
                cleanupPointTopButtonListeners();
                cleanupPointTopButtonListeners = null;
            }

            const oldButton = document.querySelector("#pointTopButton");
            if (oldButton) oldButton.remove();
        }

        function getPointScrollTop(content) {
            return Math.max(
                content ? content.scrollTop : 0,
                window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0
            );
        }

        function scrollPointViewToTop() {
            const content = document.querySelector("#pointViewContent");
            const button = document.querySelector("#pointTopButton");

            if (content) {
                try {
                    content.scrollTo({ top: 0, behavior: "smooth" });
                } catch (error) {
                    content.scrollTop = 0;
                }
            }

            try {
                window.scrollTo({ top: 0, behavior: "smooth" });
            } catch (error) {
                window.scrollTo(0, 0);
            }

            if (button) {
                button.classList.remove("is-visible");
            }
        }

        function setupPointTopButton() {
            removePointTopButton();

            const content = document.querySelector("#pointViewContent");
            if (!content) return;

            const button = document.createElement("button");
            button.id = "pointTopButton";
            button.className = "point-top-button";
            button.type = "button";
            button.title = "回到顶部";
            button.setAttribute("aria-label", "回到顶部");
            button.textContent = "↑";
            button.onclick = scrollPointViewToTop;
            document.body.appendChild(button);

            const showTemporarily = () => {
                if (getPointScrollTop(content) <= 40) {
                    button.classList.remove("is-visible");
                    return;
                }

                button.classList.add("is-visible");
                clearTimeout(pointTopButtonTimer);
                pointTopButtonTimer = setTimeout(() => {
                    button.classList.remove("is-visible");
                    button.blur();
                }, 1400);
            };

            const keepSoftAfterTouch = () => {
                button.blur();
            };

            content.addEventListener("scroll", showTemporarily, { passive: true });
            window.addEventListener("scroll", showTemporarily, { passive: true });
            content.addEventListener("touchmove", showTemporarily, { passive: true });
            button.addEventListener("touchend", keepSoftAfterTouch, { passive: true });
            button.addEventListener("pointerup", keepSoftAfterTouch);

            cleanupPointTopButtonListeners = () => {
                content.removeEventListener("scroll", showTemporarily);
                window.removeEventListener("scroll", showTemporarily);
                content.removeEventListener("touchmove", showTemporarily);
                button.removeEventListener("touchend", keepSoftAfterTouch);
                button.removeEventListener("pointerup", keepSoftAfterTouch);
            };
        }

        function updateCourse(courseId) {

            const nameInput = document.querySelector("#editCourseName");

            const chapterText = document.querySelector("#editChapterText");
            const name = nameInput.value.trim();

            if (!name) {

                return;
            }

            const lines = splitLines(chapterText.value)
                .map(line => line.trim())
                .filter(Boolean);

            const oldChapters = course.chapters;

            course.name = name;
            course.color = colorInput.value || "pink";
            course.chapters = lines.map((title, index) => {
                const old = oldChapters[index];

                if (old) {
                    old.title = title;
                    return old;
                }

                return {
                    id: createId(),
                    title,
                    status: "new",
                    learned: false,
                    points: []
                };
            });

            syncCourseStatusFromChildren(course);
            saveState();
            goBackAfterEdit();
        }

        function setCourseStatus(courseId, status) {
            const course = getCourse(courseId);
            if (!course) return;

            const nextStatus = normalizeStatusValue(status);
            course.status = nextStatus;
            course.learned = nextStatus === "mastered";
            course.chapters.forEach(chapter => {
                chapter.status = nextStatus;
                chapter.learned = nextStatus === "mastered";
                chapter.points.forEach(point => {
                    point.status = nextStatus;
                    point.learned = nextStatus === "mastered";
                });
            });

            saveState();
            render();
        }

        function setChapterStatus(courseId, chapterId, status) {
            const course = getCourse(courseId);
            const chapter = getChapter(course, chapterId);
            if (!course || !chapter) return;

            const nextStatus = normalizeStatusValue(status);
            chapter.status = nextStatus;
            chapter.learned = nextStatus === "mastered";
            chapter.points.forEach(point => {

                point.learned = nextStatus === "mastered";
            });

        }

        function moveInArray(items, itemId, direction) {
            if (!Array.isArray(items)) return false;
            const index = items.findIndex(item => item.id === itemId);
            const nextIndex = index + direction;
            if (index < 0 || nextIndex < 0 || nextIndex >= items.length) return false;

            const [item] = items.splice(index, 1);
            items.splice(nextIndex, 0, item);
            return true;
        }

        function moveCourse(courseId, direction) {
            if (!moveInArray(state.courses, courseId, direction)) return;
            saveState();
            requestFocusItem(courseId);
            render();
        }

        function moveChapter(courseId, chapterId, direction) {
            const course = getCourse(courseId);
            if (!course || !moveInArray(course.chapters, chapterId, direction)) return;
            saveState();
            requestFocusItem(chapterId);
            render();
        }

        function movePoint(courseId, chapterId, pointId, direction) {
            const course = getCourse(courseId);

            if (!chapter || !moveInArray(chapter.points, pointId, direction)) return;
            saveState();
            requestFocusItem(pointId);
            render();
        }

        async function saveEditedExample(courseId, chapterId, pointId, exampleId) {
            const course = getCourse(courseId);
            const chapter = getChapter(course, chapterId);
            const point = getPoint(chapter, pointId);
            const example = getExample(point, exampleId);

            if (!example) return;

            const titleInput = document.querySelector("#editExampleTitle");
            const contentInput = document.querySelector("#editExampleContent");
            const imageInput = document.querySelector("#editExampleImages");
            const files = Array.from((imageInput && imageInput.files) || []);
            const imageFiles = files.filter(file => file && String(file.type || "").startsWith("image/"));

            if (files.length && !imageFiles.length) {
                showNotice("没有可用图片", "请选择图片文件，例如截图、照片或 PNG/JPG 文件。也可以先不上传图片，只保存文字。 ");
                return;
            }

            const oldExample = JSON.parse(JSON.stringify(example));
            const saveButton = document.querySelector(".actions .btn-primary");
            if (saveButton) {
                saveButton.disabled = true;
                saveButton.textContent = "保存中...";
            }

            try {
                example.title = String(titleInput && titleInput.value ? titleInput.value : "").trim() || getNextExampleTitle(getSafeExamples(point));
                example.content = String(contentInput && contentInput.value ? contentInput.value : "").trim();
                if (!Array.isArray(example.images)) example.images = [];

                example.images.push(...getPendingScreenshots("editExampleImages"));
                for (const file of imageFiles) {
                    example.images.push(await fileToExampleImage(file));
                }

                if (!saveState()) {
                    Object.assign(example, oldExample);
                    return;
                }

                clearPendingScreenshots("editExampleImages");
                expandedExamplePointIds.add(pointId);
                requestFocusItem(exampleId);
                goAppBack(getViewPointRoute(course.id, chapter.id, point.id));
            } catch (error) {
                console.warn("保存例题修改失败：", error);
                Object.assign(example, oldExample);
                showNotice("保存失败", "例题图片读取失败，可以换一张图片或先截图后再上传。 ");
            } finally {
                if (saveButton) {
                    saveButton.disabled = false;
                    saveButton.textContent = "保存修改";
                }
            }
        }

            const course = getCourse(courseId);
            const chapter = getChapter(course, chapterId);
            const point = getPoint(chapter, pointId);

            if (!course || !chapter || !point) return;

            const examples = getSafeExamples(point);
            const oldLength = examples.length;
            const titleInput = document.querySelector("#newExampleTitle");
            const contentInput = document.querySelector("#newExampleContent");
            const imageInput = document.querySelector("#newExampleImages");
            const title = String(titleInput && titleInput.value ? titleInput.value : "").trim() || getNextExampleTitle(examples);
            const content = String(contentInput && contentInput.value ? contentInput.value : "").trim();
            const files = Array.from((imageInput && imageInput.files) || []);
            const imageFiles = files.filter(file => file && String(file.type || "").startsWith("image/"));

            if (files.length && !imageFiles.length) {
                showNotice("没有可用图片", "请选择图片文件，例如截图、照片或 PNG/JPG 文件。也可以先不上传图片，只保存文字。 ");
                return;

                saveButton.disabled = true;
                saveButton.textContent = "保存中...";
            }

            try {
                const images = getPendingScreenshots("newExampleImages");
                for (const file of imageFiles) {
                    images.push(await fileToExampleImage(file));
                }

                const nextExample = {
                    id: createId(),
                    title,
                    content,
                    images,
                    createdAt: new Date().toISOString()
                };

                examples.push(nextExample);

                if (oldLength === 0) expandedExamplePointIds.add(point.id);
                else expandedExamplePointIds.delete(point.id);

                if (!saveState()) {
                    examples.pop();
                    if (oldLength === 0) expandedExamplePointIds.delete(point.id);
                    return;
                }

                clearPendingScreenshots("newExampleImages");
                requestFocusItem(nextExample.id);
                goAppBack(getViewPointRoute(course.id, chapter.id, point.id));
            } catch (error) {
                console.warn("保存例题失败：", error);
                showNotice("保存失败", "例题图片读取失败，可以换一张图片或先截图后再上传。 ");
            } finally {
                if (saveButton) {
                    saveButton.disabled = false;
                    saveButton.textContent = "保存例题";
                }
            }
        }

        function readImageAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ""));
                reader.onerror = () => reject(new Error("读取图片失败"));
                reader.readAsDataURL(file);
            });
        }

        function compressImageDataUrl(dataUrl) {
            return new Promise(resolve => {
                const image = new Image();

                image.onload = () => {
                    const maxSide = 1400;
                    const width = image.naturalWidth || image.width;
                    const height = image.naturalHeight || image.height;

                    if (!width || !height) {
                        resolve(dataUrl);
                        return;
                    }

                    const scale = Math.min(1, maxSide / Math.max(width, height));
                    const canvas = document.createElement("canvas");
                    canvas.width = Math.max(1, Math.round(width * scale));
                    canvas.height = Math.max(1, Math.round(height * scale));

                    const context = canvas.getContext("2d");
                    if (!context) {
                        resolve(dataUrl);
                        return;
                    }

                    context.drawImage(image, 0, 0, canvas.width, canvas.height);

                    try {
                        resolve(canvas.toDataURL("image/jpeg", 0.82));
                    } catch (error) {
                        resolve(dataUrl);
                    }
                };

                image.onerror = () => resolve(dataUrl);
                image.src = dataUrl;
            });
        }

        async function createStoredExampleImage(image) {
            if (isDesktopApp() && window.courseStudyDesktop && typeof window.courseStudyDesktop.saveImageDataUrl === "function") {
                try {
                    const result = await window.courseStudyDesktop.saveImageDataUrl({
                        id: image.id || createId(),
                        name: image.name || "图片",
                        dataUrl: image.data || ""
                    });

                    if (result && result.ok && result.image) return result.image;
                } catch (error) {
                    console.warn("桌面端图片落盘失败，回退为内嵌图片：", error);
                }
            }

            return {
                id: image.id || createId(),
                name: image.name || "图片",
                data: image.data || ""
            };
        }

        async function fileToExampleImage(file) {
            const rawData = await readImageAsDataUrl(file);
            const data = await compressImageDataUrl(rawData);
            return createStoredExampleImage({
                id: createId(),
                name: file.name || "图片",
                data
            });
        }

        async function addExampleImages(courseId, chapterId, pointId, exampleId, input) {
            const course = getCourse(courseId);
            const chapter = getChapter(course, chapterId);
            const point = getPoint(chapter, pointId);
            const example = getExample(point, exampleId);
            const files = Array.from(input.files || []);

            if (!example || !files.length) return;

            const imageFiles = files.filter(file => file && String(file.type || "").startsWith("image/"));
            if (!imageFiles.length) {
                showNotice("没有可用图片", "请选择图片文件，例如截图、照片或 PNG/JPG 文件。");
                input.value = "";
                return;
            }

            const oldImages = Array.isArray(example.images) ? example.images.slice() : [];
            example.images = oldImages.slice();

            try {
                const nextImages = [];
                for (const file of imageFiles) {
                    nextImages.push(await fileToExampleImage(file));
                }

                example.images.push(...nextImages);

                if (!saveState()) {
                    example.images = oldImages;
                    input.value = "";
                    return;
                }

                input.value = "";
                render();
            } catch (error) {
                console.warn("添加例题图片失败：", error);
                example.images = oldImages;
                input.value = "";
                showNotice("图片添加失败", "图片读取失败，可以换一张图片或先截图后再上传。");
            }
        }

        function deleteExampleImage(courseId, chapterId, pointId, exampleId, imageId) {
            const course = getCourse(courseId);
            const chapter = getChapter(course, chapterId);
            const point = getPoint(chapter, pointId);
            const example = getExample(point, exampleId);

            if (!example || !Array.isArray(example.images)) return;

            example.images = example.images.filter(image => image.id !== imageId);
            saveState();
            render();
        }

        async function exportData() {
            const exportObject = {
                app: "课程学习进度记录",
                version: "3.1-desktop",
                exportedAt: new Date().toISOString(),
                data: state
            };

            if (isDesktopApp() && window.courseStudyDesktop && typeof window.courseStudyDesktop.exportData === "function") {
                try {
                    const result = await window.courseStudyDesktop.exportData(exportObject);
                    if (result && !result.canceled) {
                        showNotice("导出成功", `数据已导出到：${result.filePath}`);
                    }
                    return;
                } catch (error) {
                    console.warn("桌面端导出失败：", error);
                    showNotice("导出失败", "无法写入导出文件。请换一个保存位置后再试。");
                    return;
                }
            }

            const text = JSON.stringify(exportObject, null, 2);
            const blob = new Blob([text], {
                type: "application/json;charset=utf-8"
            });

            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            const date = new Date().toISOString().slice(0, 10);

            link.href = url;
            link.download = `课程学习进度-${date}.json`;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            URL.revokeObjectURL(url);
        }

        function readImportFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = () => resolve(String(reader.result || ""));
                reader.onerror = () => reject(new Error("读取文件失败"));
                reader.readAsText(file, "utf-8");
            });
        }


        function showImportChoice(courseCount) {
            return new Promise(resolve => {
                const oldModal = document.querySelector(".modal-overlay");
                if (oldModal) oldModal.remove();

                const overlay = document.createElement("div");
                overlay.className = "modal-overlay";
                overlay.innerHTML = `
                    <section class="modal-card" role="dialog" aria-modal="true">
                        <h3>确认导入数据</h3>
                        <p>文件中有 ${courseCount} 门课程。请选择导入方式：覆盖会替换当前浏览器数据；合并会把文件中的课程追加到当前数据后面。</p>
                        <div class="modal-actions">
                            <button class="btn" data-action="cancel">取消</button>
                            <button class="btn btn-purple" data-action="merge">合并导入</button>
                            <button class="btn btn-primary" data-action="replace">覆盖导入</button>
                        </div>
                    </section>
                `;
                document.body.appendChild(overlay);

                const close = result => {
                    overlay.remove();
                    resolve(result);
                };

                overlay.querySelector('[data-action="cancel"]').onclick = () => close(null);
                overlay.querySelector('[data-action="merge"]').onclick = () => close("merge");
                overlay.querySelector('[data-action="replace"]').onclick = () => close("replace");
                overlay.onclick = event => {
                    if (event.target === overlay) close(null);
                };
            });
        }

        function cloneCourseWithFreshIds(course) {
            return {
                id: createId(),
                name: course.name,
                color: course.color,
                status: getItemStatus(course),
                learned: getItemStatus(course) === "mastered",
                chapters: (course.chapters || []).map(chapter => ({
                    id: createId(),
                    title: chapter.title,
                    status: getItemStatus(chapter),
                    learned: getItemStatus(chapter) === "mastered",
                    points: (chapter.points || []).map(point => ({
                        id: createId(),
                        title: point.title,
                        content: point.content || "",
                        status: getItemStatus(point),
                        learned: getItemStatus(point) === "mastered",
                        createdAt: point.createdAt || new Date().toISOString(),
                        examples: getSafeExamples(point).map(example => ({
                            id: createId(),
                            title: example.title,
                            content: example.content || "",
                            images: (example.images || []).map(image => ({
                                id: createId(),
                                name: image.name || "图片",
                                data: image.data || ""
                            })).filter(image => image.data),
                            createdAt: example.createdAt || new Date().toISOString()
                        }))
                    }))
                }))
            };
        }

        async function importData() {
            const handleImportedText = async text => {
                const imported = JSON.parse(text);
                const importedState = imported && imported.data ? imported.data : imported;

                if (!importedState || !Array.isArray(importedState.courses)) {
                    showNotice("导入失败", "这个文件不像是本软件导出的课程数据。请确认选择的是之前导出的 JSON 文件。");
                    return;
                }

                const nextState = normalizeState(importedState);
                const courseCount = nextState.courses.length;
                const mode = await showImportChoice(courseCount);

                if (!mode) return;

                if (isDesktopApp() && window.courseStudyDesktop && typeof window.courseStudyDesktop.createBackup === "function") {
                    await window.courseStudyDesktop.createBackup("before-import");
                }

                if (mode === "replace") {
                    state = nextState;
                } else {
                    const importedCourses = nextState.courses.map(course => cloneCourseWithFreshIds(course));
                    state.courses.push(...importedCourses);
                }

                saveState();
                setRoute({
                    page: "home",
                    courseId: null,
                    chapterId: null,
                    pointId: null,
                    exampleId: null,
                    returnRoute: null
                }, { replaceHistory: true });

                showNotice("导入成功", mode === "replace" ? `已覆盖导入 ${courseCount} 门课程。` : `已合并导入 ${courseCount} 门课程。`);
            };

            if (isDesktopApp() && window.courseStudyDesktop && typeof window.courseStudyDesktop.importData === "function") {
                try {
                    const result = await window.courseStudyDesktop.importData();
                    if (!result || result.canceled) return;
                    await handleImportedText(String(result.text || ""));
                } catch (error) {
                    console.warn("导入数据失败：", error);
                    showNotice("导入失败", "文件读取或解析失败。请确认文件没有损坏，并且是 JSON 格式。");
                }
                return;
            }

            const input = document.createElement("input");
            input.type = "file";
            input.accept = ".json,application/json";

            input.onchange = async () => {
                const file = input.files && input.files[0];
                if (!file) return;

                try {
                    const text = await readImportFile(file);
                    await handleImportedText(text);
                } catch (error) {
                    console.warn("导入数据失败：", error);
                    showNotice("导入失败", "文件读取或解析失败。请确认文件没有损坏，并且是 JSON 格式。");
                }
            };

            input.click();
        }


        function setupDesktopMenuActions() {
            if (!isDesktopApp() || !window.courseStudyDesktop || typeof window.courseStudyDesktop.onMenuAction !== "function") return;

            window.courseStudyDesktop.onMenuAction(async action => {
                if (action === "export") {
                    exportData();
                    return;
                }

                if (action === "import") {
                    importData();
                    return;
                }

                if (action === "usage") {
                    showUsageNotice();
                    return;
                }

                if (action === "toggle-theme") {
                    togglePageTheme();
                    return;
                }

                if (action === "backup-created") {
                    showNotice("备份完成", "已在应用数据文件夹中创建当前数据备份。你也可以从菜单“文件 → 打开数据文件夹”查看。 ");
                }
            });
        }

        function runTests() {
            const testCourse = {
                id: "c1",
                name: "测试课程",
                color: "blue",
                learned: false,
                chapters: [{
                    id: "ch1",
                    title: "测试目录",
                    learned: false,
                    points: [
                        {
                            id: "p1",
                            title: "知识点1",
                            content: "",
                            learned: true
                        },
                        {
                            id: "p2",
                            title: "知识点2",
                            content: "",
                            learned: false
                        }
                    ]
                }]
            };

            console.assert(
                getCourseStats(testCourse).percent === 33,
                "课程进度测试失败"
            );

            console.assert(
                getChapterStats(testCourse.chapters[0]).percent === 50,
                "目录进度测试失败"
            );

            console.assert(
                splitLines("a" + NL + "b").length === 2,
                "多行拆分测试失败"
            );

            console.info("课程学习进度网页：内置测试已通过。");
        }

        runTests();
        applyTheme();
        setupDesktopMenuActions();
        initRouteHistory();
        render();
    </script>
</body>
