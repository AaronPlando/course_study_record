<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课程学习进度记录</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #ffe4ec 0, transparent 32%),
                radial-gradient(circle at top right, #d8f5ff 0, transparent 28%),
                linear-gradient(135deg, #fff7df 0%, #f4f0ff 48%, #eafcff 100%);
            color: #344054;
        }

        button, input, textarea, select { font-family: inherit; }

html,
body,
.app,
.page-view,
.hero,
.toolbar,
.card,
.form-panel,
.note-card,
.breadcrumb,
.meta,
.hint,
.brand,
.logo,
.brand-title,
.brand-subtitle,
.btn,
.card-title-button,
.learned,
.more-menu,
.more-menu summary,
.more-menu-list,
.progress-label,
.empty {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
}

button,
.btn,
summary,
label,
.card-title-button,
.brand {
    touch-action: manipulation;
}

input,
textarea,
select {
    user-select: text;
    -webkit-user-select: text;
    -webkit-touch-callout: default;
    -webkit-tap-highlight-color: auto;
}
        .app {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
            padding: 34px 0 60px;
        }

        .page-view {
            animation: pageFadeIn 0.16s ease-out both;
        }

        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translate3d(0, 5px, 0);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        @keyframes menuPopIn {
            from {
                opacity: 0;
                transform: translate3d(0, -4px, 0) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        @keyframes pointFadeIn {
            from {
                opacity: 0;
                transform: translate3d(0, 3px, 0);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

@keyframes modalBackdropIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes modalCardIn {
    from {
        opacity: 0;
        transform: translate3d(0, 10px, 0) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
    }
}

.image-preview-overlay {
    position: fixed;
    inset: 0;
    z-index: 3000;
    display: flex;
    flex-direction: column;
    background: rgba(15, 23, 42, 0.92);
    color: #ffffff;
}

.image-preview-topbar {
    flex: 0 0 auto;
    min-height: 58px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    background: rgba(15, 23, 42, 0.86);
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
}

.image-preview-topbar strong {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.image-preview-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.image-preview-stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    display: grid;
    place-items: center;
    cursor: grab;
}

.image-preview-stage img {
    max-width: 92vw;
    max-height: calc(100vh - 88px);
    max-height: calc(100dvh - 88px);
    object-fit: contain;
    transform-origin: center center;
    transition: transform 0.08s linear;
    user-select: none;
    -webkit-user-drag: none;
    image-rendering: auto;
}

.image-preview-stage img.is-dragging {
    cursor: grabbing;
    transition: none;
}

.image-preview-loading {
    position: absolute;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.16);
    color: rgba(255, 255, 255, 0.88);
    font-size: 13px;
    pointer-events: none;
}

        .example-image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-top: 12px;
}

.example-image-button {
    border: none;
    padding: 0;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.72);
    box-shadow: 0 8px 18px rgba(102, 112, 133, 0.08);
    cursor: pointer;
    aspect-ratio: 4 / 3;
}

.example-image-button img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    image-rendering: auto;
}

.example-image-button:hover {
    opacity: 0.92;
}
        
@media (max-width: 640px) {
    .image-preview-topbar {
        align-items: flex-start;
        flex-direction: column;
    }

    .image-preview-actions {
        width: 100%;
    }

    .image-preview-actions .btn {
        flex: 1;
        min-width: 70px;
    }

    .image-preview-stage img {
        max-width: 96vw;
        max-height: calc(100vh - 132px);
        max-height: calc(100dvh - 132px);
    }
}
        
.modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: grid;
    place-items: center;
    padding: 22px;
    background: rgba(71, 85, 105, 0.2);
    animation: modalBackdropIn 0.18s ease;
}

.modal-card {
    width: min(420px, 100%);
    border-radius: 30px;
    padding: 24px;
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.95);
    box-shadow: 0 20px 56px rgba(102, 112, 133, 0.2);
    animation: modalCardIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    will-change: opacity, transform;
}

.modal-card h3 {
    margin: 0 0 10px;
    font-size: 22px;
    color: #2f3a4a;
}

.modal-card p {
    margin: 0;
    line-height: 1.8;
    color: #667085;
}

.usage-modal-card {
    width: min(620px, 100%);
    max-height: calc(100vh - 28px);
    max-height: calc(100dvh - 28px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.usage-modal-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
}

.usage-modal-header h3 {
    margin: 0;
}


.usage-modal-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-right: 4px;
}

.usage-notice {
    margin-top: 0;
    color: #5d6678;
    line-height: 1.75;
    font-size: 15px;
}

.usage-notice ol {
    margin: 0;
    padding-left: 22px;
}

.usage-notice li {
    margin: 9px 0;
}

.usage-notice strong {
    color: #344054;
}

.usage-modal-actions {
    flex: 0 0 auto;
    margin-top: 14px;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
    flex-wrap: wrap;
}

.modal-danger h3 {
    color: #b42318;
}

@media (max-width: 640px) {
    .modal-card {
        border-radius: 26px;
        padding: 22px;
    }

    .usage-modal-card {
        width: 100%;
        max-height: calc(100vh - 18px);
        max-height: calc(100dvh - 18px);
        border-radius: 24px;
        padding: 18px;
    }

    .usage-modal-header {
        margin-bottom: 10px;
    }

    .usage-modal-header h3 {
        font-size: 23px;
    }


    .usage-notice {
        font-size: 15px;
        line-height: 1.68;
    }

    .usage-notice li {
        margin: 7px 0;
    }

    .modal-actions .btn {
        width: 100%;
    }

    .usage-modal-actions .btn {
        width: 100%;
    }
}

        /* 页面主动画已在上方定义，这里不再重复定义，避免手机端重复计算。 */

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo {
            width: 46px;
            height: 46px;
            border-radius: 18px;
            background: linear-gradient(135deg, #ffb8c6, #b7e4ff);
            display: grid;
            place-items: center;
            font-size: 24px;
            box-shadow: 0 12px 30px rgba(121, 134, 203, 0.22);
        }

        .brand-title {
            margin: 0;
            font-size: 23px;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            margin: 4px 0 0;
            font-size: 13px;
            color: #667085;
        }

        .hero {
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 34px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.58);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 70px rgba(129, 140, 248, 0.18);
            margin-bottom: 24px;
        }

        .hero h2 {
            margin: 0 0 10px;
            font-size: 32px;
            color: #263238;
        }

        .hero p {
            margin: 0;
            line-height: 1.8;
            color: #667085;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin: 22px 0;
            flex-wrap: wrap;
        }

        .toolbar-actions, .card-actions, .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 15px;
            color: #344054;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 12px 28px rgba(102, 112, 133, 0.13);
            transition: transform 0.12s ease, opacity 0.12s ease;
        }

        .btn:hover {
            opacity: 0.94;
            transform: translate3d(0, -1px, 0);
        }

        .btn:active {
            transform: translate3d(0, 0, 0) scale(0.99);
        }

        .btn-primary { background: linear-gradient(135deg, #ffd1dc, #bde7ff); font-weight: 700; }
        .btn-green { background: linear-gradient(135deg, #d9f7be, #b5ead7); font-weight: 700; }
        .btn-danger { background: linear-gradient(135deg, #ffd6d6, #ffe5b4); }
        .btn-purple { background: linear-gradient(135deg, #e5d4ff, #d7f9ff); font-weight: 700; }
        .btn-enter { padding: 14px 24px; min-width: 118px; font-size: 16px; font-weight: 700; }
        .btn-back { margin: 0 0 18px; background: rgba(255, 255, 255, 0.78); font-weight: 700; }
        .btn-more { min-width: 48px; padding: 10px 15px; font-size: 20px; line-height: 1; font-weight: 800; }
        .btn-expand { min-width: 48px; width: auto; padding: 10px 15px; font-size: 18px; line-height: 1; font-weight: 800; }

        .more-menu { position: relative; display: inline-block; }
        .more-menu summary { list-style: none; }
        .more-menu summary::-webkit-details-marker { display: none; }

        .more-menu-list {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            z-index: 20;
            min-width: 150px;
            padding: 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 14px 34px rgba(102, 112, 133, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.95);
            transform-origin: top right;
        }

        .more-menu-list.menu-pop {
            animation: menuPopIn 0.14s ease-out both;
        }

        .more-menu-list .btn {
            width: 100%;
            margin-bottom: 8px;
            box-shadow: none;
        }

        .more-menu-list .btn:last-child { margin-bottom: 0; }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 18px;
        }

        .card {
            position: relative;
            overflow: visible;
            border-radius: 28px;
            padding: 22px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 18px 48px rgba(148, 163, 184, 0.18);
            transition: transform 0.14s ease, box-shadow 0.14s ease;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 8px;
            border-radius: 28px 28px 0 0;
            background: var(--course-color, linear-gradient(135deg, #ffd1dc, #bde7ff));
        }

        .card:hover {
            transform: translate3d(0, -2px, 0);
            box-shadow: 0 20px 50px rgba(148, 163, 184, 0.2);
        }

        .card-title-button {
            border: none;
            background: transparent;
            padding: 0;
            text-align: left;
            cursor: pointer;
            font-size: 21px;
            font-weight: 700;
            color: #2f3a4a;
            line-height: 1.45;
        }

        .card-title-button:hover { color: #7c6ee6; }

        .meta {
            margin: 8px 0 16px;
            font-size: 14px;
            color: #667085;
            line-height: 1.7;
        }

        .pill-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .card-actions { margin-top: 14px; }

        .learned {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 999px;
            background: #f8fbff;
            color: #536079;
            font-size: 14px;
            user-select: none;
        }

        .learned input {
            width: 17px;
            height: 17px;
            accent-color: #95d5b2;
        }

        .progress-block { margin: 14px 0 16px; }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #667085;
            font-size: 13px;
            margin-bottom: 7px;
        }

        .progress-track {
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .progress-fill {
            height: 100%;
            width: var(--progress, 0%);
            border-radius: 999px;
            background: var(--course-color, linear-gradient(135deg, #ffd1dc, #bde7ff));
            transition: width 0.25s ease;
        }

        .form-panel {
            max-width: 780px;
            margin: 0 auto;
            border-radius: 34px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 24px 64px rgba(148, 163, 184, 0.2);
        }

        .form-title { margin: 0 0 18px; font-size: 27px; }
        .field { margin-bottom: 18px; }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #3d4858;
        }

        .field input, .field textarea, .field select, .small-input-row input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.28);
            outline: none;
            border-radius: 22px;
            padding: 14px 16px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.88);
            color: #344054;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .field textarea {
            min-height: 150px;
            resize: vertical;
            line-height: 1.7;
        }

        .hint {
            margin-top: 7px;
            color: #798294;
            font-size: 13px;
            line-height: 1.6;
        }

        .breadcrumb {
            margin: 0 0 18px;
            color: #667085;
            font-size: 14px;
        }

        .breadcrumb button {
            border: none;
            background: transparent;
            color: #6670d8;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
        }

        .empty {
            border-radius: 28px;
            padding: 30px;
            text-align: center;
            color: #667085;
            background: rgba(255, 255, 255, 0.62);
            border: 1px dashed rgba(148, 163, 184, 0.55);
        }

.page-watermark {
    margin-top: 34px;
    text-align: center;
    font-size: 13px;
    letter-spacing: 1.8px;
    color: rgba(102, 112, 133, 0.28);
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
}

        .note-card {
            border-radius: 24px;
            padding: 18px;
            background: linear-gradient(135deg, rgba(255, 242, 204, 0.74), rgba(220, 246, 255, 0.76));
            border: 1px solid rgba(255, 255, 255, 0.85);
            margin-bottom: 14px;
            box-shadow: 0 10px 26px rgba(102, 112, 133, 0.08);
        }

        .note-card h4 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #2f3a4a;
        }

        .note-card p {
            margin: 0 0 14px;
            color: #3f4d42;
            line-height: 1.75;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            max-height: 180px;
            overflow-y: auto;
            padding: 12px 14px;
            border-radius: 18px;
            background: #f7fbf2;
            border: 1px solid #e0ecd8;
            -webkit-overflow-scrolling: touch;
        }

        .note-card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 0;
        }

        .app.app-point-view {
            width: 100%;
            max-width: none;
            padding: 10px;
        }

        .point-view-shell {
            min-height: calc(100dvh - 20px);
            display: flex;
        }

        .point-view-card {
            width: 100%;
            min-height: calc(100dvh - 20px);
            margin: 0;
            border-radius: 28px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 28px rgba(102, 112, 133, 0.1);
            display: flex;
            flex-direction: column;
        }

        .point-view-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .point-view-location {
            flex: 1;
            min-width: 180px;
            color: #667085;
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
        }

        .point-view-title {
            margin: 0 0 12px;
            font-size: 30px;
            line-height: 1.35;
            color: #263238;
            flex: 0 0 auto;
        }

        .point-view-content {
            flex: 1 1 auto;
            min-height: 0;
            max-height: none;
            overflow-y: auto;
            border-radius: 24px;
            padding: 24px;
            background: #f7fbf2;
            border: 1px solid #e0ecd8;
            color: #354139;
            font-size: 18px;
            line-height: 1.95;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            -webkit-overflow-scrolling: touch;
        }

        .point-view-content {
            white-space: normal;
        }

        .point-main-text {
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }


        .status-segment {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), 0 8px 20px rgba(102, 112, 133, 0.08);
        }

        .status-option {
            border: none;
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            background: transparent;
            color: #667085;
            font-size: 14px;
            line-height: 1;
            transition: background 0.14s ease, color 0.14s ease, transform 0.12s ease, box-shadow 0.14s ease;
        }

        .status-option:hover {
            color: #344054;
            background: rgba(255, 255, 255, 0.66);
        }

        .status-option:active {
            transform: scale(0.98);
        }

        .status-option.is-active {
            color: #2f3a4a;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd1dc, #bde7ff);
            box-shadow: 0 8px 18px rgba(102, 112, 133, 0.13);
        }

        .btn-move {
            background: linear-gradient(135deg, #fff2b8, #d7f9ff);
            font-weight: 700;
        }

        .newly-added-highlight {
            animation: newlyAddedPulse 1.6s ease;
            box-shadow: 0 0 0 3px rgba(149, 213, 178, 0.55), 0 16px 36px rgba(102, 112, 133, 0.16) !important;
        }

        @keyframes newlyAddedPulse {
            0% { transform: translateY(-2px); box-shadow: 0 0 0 5px rgba(149, 213, 178, 0.76), 0 18px 42px rgba(102, 112, 133, 0.18); }
            100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(149, 213, 178, 0), 0 8px 20px rgba(102, 112, 133, 0.08); }
        }

        .point-quick-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 0 0 12px;
            padding: 8px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .point-section-anchor {
            scroll-margin-top: 16px;
        }

        .quick-nav-flash {
            animation: quickNavFlash 0.7s ease;
            border-radius: 14px;
        }

        @keyframes quickNavFlash {
            0% { box-shadow: 0 0 0 0 rgba(255, 209, 220, 0); }
            40% { box-shadow: 0 0 0 5px rgba(255, 209, 220, 0.55); }
            100% { box-shadow: 0 0 0 0 rgba(255, 209, 220, 0); }
        }

        .example-display-card {
            position: relative;
            z-index: 1;
            overflow: visible;
            border-radius: 22px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.74);

        .point-top-button {
            position: fixed;
            left: 14px;
            bottom: max(18px, calc(env(safe-area-inset-bottom) + 18px));
            z-index: 9999;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 999px;
            display: grid;
            place-items: center;
            cursor: pointer;
            color: #344054;
            background: rgba(255, 255, 255, 0.64);
            box-shadow: 0 8px 22px rgba(102, 112, 133, 0.16);
            font-size: 20px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            transform: translate3d(0, 8px, 0);
            transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .point-top-button.is-visible {
            opacity: 0.58;
            pointer-events: auto;
            transform: translate3d(0, 0, 0);
        }

        .point-top-button.is-visible:active {
            opacity: 0.58;
            background: rgba(255, 255, 255, 0.64);
        }

        @media (hover: hover) and (pointer: fine) {
            .point-top-button.is-visible:hover {
                opacity: 0.72;
                background: rgba(255, 255, 255, 0.76);
            }
        }

        @media (hover: none), (pointer: coarse) {
            .point-top-button.is-visible:hover,
            .point-top-button.is-visible:active,
            .point-top-button.is-visible:focus {
                opacity: 0.58;
                background: rgba(255, 255, 255, 0.64);
            }
        }

        .point-top-button:not(.is-visible) {
            opacity: 0;
            pointer-events: none;
            transform: translate3d(0, 8px, 0);
            background: rgba(255, 255, 255, 0.64);
        }

    <div id="app" class="app"></div>

    <script>
        const STORAGE_KEY = "course-progress-macaron-v2";
        const OLD_STORAGE_KEY = "course-progress-macaron-v1";
        const THEME_STORAGE_KEY = "course-progress-page-theme-v2";
        const NL = String.fromCharCode(10);
        const CR = String.fromCharCode(13);

function isEditableElement(element) {
    return Boolean(
        element &&
        element.closest &&
        element.closest("input, textarea, select, [contenteditable='true']")
    );
}

document.addEventListener("contextmenu", event => {
    if (isEditableElement(event.target)) return;
    event.preventDefault();
});

document.addEventListener("selectstart", event => {
    if (isEditableElement(event.target)) return;
    event.preventDefault();
});

document.addEventListener("dragstart", event => {
    if (isEditableElement(event.target)) return;
    event.preventDefault();
});

document.addEventListener("selectionchange", () => {
    const active = document.activeElement;
    if (isEditableElement(active)) return;

    const selection = window.getSelection();
    if (selection && !selection.isCollapsed) {
        selection.removeAllRanges();
    }
});
        const colorOptions = {
            pink: { name: "草莓粉", value: "linear-gradient(135deg, #ffd1dc, #ffc8dd)" },
            blue: { name: "天空蓝", value: "linear-gradient(135deg, #bde7ff, #cde7ff)" },
            green: { name: "薄荷绿", value: "linear-gradient(135deg, #d9f7be, #b5ead7)" },
            purple: { name: "香芋紫", value: "linear-gradient(135deg, #e5d4ff, #d7c9ff)" },
            yellow: { name: "奶油黄", value: "linear-gradient(135deg, #fff2b8, #ffe5b4)" },
            orange: { name: "蜜桃橙", value: "linear-gradient(135deg, #ffd6a5, #ffcad4)" }
        };

        let state = loadState();
        let route = { page: "home", courseId: null, chapterId: null, pointId: null, exampleId: null, returnRoute: null };
        let appHistoryIndex = 0;
        let currentTheme = loadTheme();
        const expandedExamplePointIds = new Set();
        let pendingFocusItem = null;
        const SCREENSHOT_SHORTCUT_STORAGE_KEY = "course-progress-screenshot-shortcut-v1";
        let screenshotShortcut = loadScreenshotShortcut();
        let waitingForScreenshotShortcut = false;
        const pendingExampleScreenshots = { newExampleImages: [], editExampleImages: [] };
        let activeImageViewerClose = null;

        function createId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        }

        function splitLines(text) {
            return String(text).replaceAll(CR, "").split(NL);
        }


        function normalizeExamples(rawExamples) {
            const examples = Array.isArray(rawExamples) ? rawExamples : [];

            return examples.map((example, index) => ({
                id: example.id || createId(),
                title: example.title || `例题${index + 1}`,
                content: example.content || "",
                images: Array.isArray(example.images) ? example.images.map(image => ({
                    id: image.id || createId(),
                    name: image.name || "图片",
                    data: image.data || image.url || ""
                })).filter(image => image.data) : [],
                createdAt: example.createdAt || new Date().toISOString()
            }));
        }

        function isDesktopApp() {
            return Boolean(window.courseStudyDesktop && window.courseStudyDesktop.isElectron);
        }

        function loadState() {
            try {
                if (isDesktopApp() && typeof window.courseStudyDesktop.loadDataSync === "function") {
                    const result = window.courseStudyDesktop.loadDataSync();
                    if (result && result.ok && result.state) return normalizeState(result.state);
                    console.warn("读取桌面端数据失败：", result && result.error);
                }

                const savedV2 = localStorage.getItem(STORAGE_KEY);
                if (savedV2) return normalizeState(JSON.parse(savedV2));
                const savedV1 = localStorage.getItem(OLD_STORAGE_KEY);
                if (savedV1) return normalizeState(JSON.parse(savedV1));
            } catch (error) {
                console.warn("读取本地数据失败：", error);
            }
            return { courses: [] };
        }


        function loadTheme() {
            try {
                const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
                if (["macaron", "comfort", "minimal"].includes(savedTheme)) return savedTheme;
            } catch (error) {
                console.warn("读取页面风格失败：", error);
            }
            return "comfort";
        }

        function saveTheme() {
            try {
                localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
            } catch (error) {
                console.warn("保存页面风格失败：", error);
            }
        }

        function getNextTheme() {
            if (currentTheme === "macaron") return "comfort";
            if (currentTheme === "comfort") return "minimal";
            return "macaron";
        }

        function applyTheme() {
            document.body.classList.toggle("theme-comfort", currentTheme === "comfort");
            document.body.classList.toggle("theme-minimal", currentTheme === "minimal");
        }

        function themeToggleText() {
            const themeNames = {
                macaron: "马卡龙风格",
                comfort: "青藤护眼风格",
                minimal: "黑白简约风格"
            };
            return `切换${themeNames[getNextTheme()]}`;
        }

        function togglePageTheme() {
            currentTheme = getNextTheme();
            saveTheme();
            applyTheme();
            render();
        }

        function normalizeState(raw) {
            const courses = Array.isArray(raw && raw.courses) ? raw.courses : [];
            return {
                courses: courses.map(course => ({
                    id: course.id || createId(),
                    name: course.name || "未命名课程",
                    color: course.color || "pink",
                    status: normalizeStatusValue(course.status || (course.learned ? "mastered" : "new")),
                    learned: Boolean(course.learned || course.status === "mastered"),
                    chapters: Array.isArray(course.chapters) ? course.chapters.map(chapter => ({
                        id: chapter.id || createId(),
                        title: chapter.title || "未命名目录",
                        status: normalizeStatusValue(chapter.status || (chapter.learned ? "mastered" : "new")),
                        learned: Boolean(chapter.learned || chapter.status === "mastered"),
                        points: Array.isArray(chapter.points) ? chapter.points.map(point => ({
                            id: point.id || createId(),
                            title: point.title || "未命名知识点",
                            content: point.content || "",
                            status: normalizeStatusValue(point.status || (point.learned ? "mastered" : "new")),
                            learned: Boolean(point.learned || point.status === "mastered"),
                            createdAt: point.createdAt || new Date().toISOString(),
                            examples: normalizeExamples(point.examples)
                        })) : []
                    })) : []
                }))
            };
        }

        function saveState() {
            try {
                if (isDesktopApp() && typeof window.courseStudyDesktop.saveDataSync === "function") {
                    const result = window.courseStudyDesktop.saveDataSync(state);
                    if (result && result.ok) {
                        if (result.state) state = normalizeState(result.state);
                        return true;
                    }
                    throw new Error((result && result.error) || "桌面端数据保存失败");
                }

                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                return true;
            } catch (error) {
                console.warn("保存本地数据失败：", error);
                if (typeof showNotice === "function") {
                    showNotice("保存失败", isDesktopApp()
                        ? "桌面端数据文件保存失败。请确认软件有写入权限，或尝试以管理员身份运行。"
                        : "当前浏览器本地存储空间可能不够。图片较多或图片太大会导致保存失败，建议减少图片数量后再试。");
                }
                return false;
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function getImageThumbData(image) {
    if (!image) return "";

    return image.thumbData || image.data || image.url || "";
}

async function getImageFullData(image) {
    if (!image) return "";

    if (image.fullData) return image.fullData;

    if (image.fileName && window.courseStudyDesktop && typeof window.courseStudyDesktop.readImageFull === "function") {
        try {
            const result = await window.courseStudyDesktop.readImageFull({
                fileName: image.fileName
            });

            if (result && result.ok && result.data) {
                return result.data;
            }
        } catch (error) {
            console.warn("读取原图失败：", error);
        }
    }

    return image.data || image.thumbData || image.url || "";
}

function imageViewerPayloadAttr(image) {
    const payload = {
        id: image && image.id ? image.id : "",
        name: image && image.name ? image.name : "图片",
        fileName: image && image.fileName ? image.fileName : "",
        data: getImageThumbData(image),
        thumbData: getImageThumbData(image),
        hasFullImage: Boolean(image && image.fileName)
    };

    return escapeHtml(encodeURIComponent(JSON.stringify(payload)));
}
        
function releaseImagePreviewSource() {
    const previewImage = document.querySelector("#imagePreviewImage");

    if (previewImage) {
        previewImage.removeAttribute("src");
    }
}
        
        function getCourse(courseId) {
            return state.courses.find(course => course.id === courseId);
        }

        function getChapter(course, chapterId) {
            return course && course.chapters ? course.chapters.find(chapter => chapter.id === chapterId) : null;
        }

        function getPoint(chapter, pointId) {
            return chapter && chapter.points ? chapter.points.find(point => point.id === pointId) : null;
        }

        function getColorValue(colorKey) {
            return (colorOptions[colorKey] || colorOptions.pink).value;
        }

        function getColorName(colorKey) {
            return (colorOptions[colorKey] || colorOptions.pink).name;
        }

        function colorStyle(colorKey) {
            return "--course-color: " + getColorValue(colorKey) + ";";
        }


        function normalizeStatusValue(status) {
            if (status === "mastered" || status === "reviewing" || status === "new") return status;
            return "new";
        }

        function getItemStatus(item) {
            if (!item) return "new";
            return normalizeStatusValue(item.status || (item.learned ? "mastered" : "new"));
        }

        function statusProgressValue(item) {
            const status = getItemStatus(item);
            if (status === "mastered") return 1;
            if (status === "reviewing") return 0.5;
            return 0;
        }

        function statusOptionsHtml(selectedStatus) {
            const selected = normalizeStatusValue(selectedStatus);
            const options = [
                ["new", "未学"],
                ["reviewing", "复习中"],
                ["mastered", "已掌握"]
            ];

            return options.map(([value, label]) => `<option value="${value}" ${selected === value ? "selected" : ""}>${label}</option>`).join("");
        }

        function statusControlHtml(selectedStatus, onchangeCode) {
            const selected = normalizeStatusValue(selectedStatus);
            const options = [
                { value: "new", label: "未学" },
                { value: "reviewing", label: "复习中" },
                { value: "mastered", label: "已掌握" }
            ];

            return `
                <div class="status-segment" role="group" aria-label="学习状态">
                    ${options.map(option => {
                        const actionCode = onchangeCode.replace("this.value", `'${option.value}'`);
                        return `<button type="button" class="status-option ${selected === option.value ? "is-active" : ""}" onclick="${actionCode}">${option.label}</button>`;
                    }).join("")}
                </div>
            `;
        }

        function syncChapterStatusFromPoints(chapter) {
            if (!chapter) return;
            if (!chapter.points || !chapter.points.length) {
                chapter.status = normalizeStatusValue(chapter.status || (chapter.learned ? "mastered" : "new"));
            } else {
                const score = chapter.points.reduce((sum, point) => sum + statusProgressValue(point), 0);
                if (score === chapter.points.length) chapter.status = "mastered";
                else if (score > 0) chapter.status = "reviewing";
                else chapter.status = "new";
            }
            chapter.learned = chapter.status === "mastered";
        }

        function syncCourseStatusFromChildren(course) {
            if (!course) return;
            if (!course.chapters || !course.chapters.length) {
                course.status = normalizeStatusValue(course.status || (course.learned ? "mastered" : "new"));
            } else {
                const score = course.chapters.reduce((sum, chapter) => sum + statusProgressValue(chapter), 0);
                if (score === course.chapters.length) course.status = "mastered";
                else if (score > 0) course.status = "reviewing";
                else course.status = "new";
            }
            course.learned = course.status === "mastered";
        }

        function getCourseStats(course) {
            let total = 0;
            let score = 0;

            course.chapters.forEach(chapter => {
                total += 1;
                score += statusProgressValue(chapter);
                chapter.points.forEach(point => {
                    total += 1;
                    score += statusProgressValue(point);
                });
            });

            if (total === 0) {
                const singleScore = statusProgressValue(course);
                return { total: 1, learned: singleScore, percent: Math.round(singleScore * 100) };
            }

            return { total, learned: score, percent: Math.round((score / total) * 100) };
        }

        function getChapterStats(chapter) {
            const total = Math.max(chapter.points.length, 1);
            const score = chapter.points.length
                ? chapter.points.reduce((sum, point) => sum + statusProgressValue(point), 0)
                : statusProgressValue(chapter);
            return { total, learned: score, percent: Math.round((score / total) * 100) };
        }

        function setRoute(nextRoute, options = {}) {
            const baseRoute = { page: "home", courseId: null, chapterId: null, pointId: null, exampleId: null, returnRoute: null };
            route = getPlainRoute(Object.assign(baseRoute, nextRoute || {}));
            render();
            syncRouteHistory(options);
        }

        function routeSignature(target) {
            return JSON.stringify(getPlainRoute(target));
        }

        function routeToHash(target) {
            return "#r=" + encodeURIComponent(routeSignature(target));
        }

        function routeFromHash() {
            const hash = window.location.hash || "";
            if (!hash.startsWith("#r=")) return null;

            try {
                return getPlainRoute(JSON.parse(decodeURIComponent(hash.slice(3))));
            } catch (error) {
                console.warn("解析页面地址失败：", error);
                return null;
            }
        }

        function makeRouteUrl(target) {
            const base = window.location.href.split("#")[0];
            return base + routeToHash(target);
        }

        function applyBrowserRoute(nextRoute, nextIndex) {
            if (!nextRoute) return;
            if (routeSignature(route) === routeSignature(nextRoute)) return;

            route = getPlainRoute(nextRoute);
            appHistoryIndex = Math.max(0, Number(nextIndex) || 0);
            render();
        }

        function syncRouteHistory(options = {}) {
            if (!window.history || !window.history.pushState) return;
            if (options.skipHistory) return;

            const historyRoute = getPlainRoute(route);
            const historyState = {
                courseProgressRoute: historyRoute,
                appHistoryIndex
            };
            const nextUrl = makeRouteUrl(historyRoute);

            if (options.replaceHistory) {
                window.history.replaceState(historyState, "", nextUrl);
                return;
            }

            appHistoryIndex += 1;
            window.history.pushState({
                courseProgressRoute: historyRoute,
                appHistoryIndex
            }, "", nextUrl);
        }

        function initRouteHistory() {
            if (!window.history || !window.history.replaceState) return;

            const initialState = window.history.state;
            const hashRoute = routeFromHash();

            if (initialState && initialState.courseProgressRoute) {
                route = getPlainRoute(initialState.courseProgressRoute);
                appHistoryIndex = initialState.appHistoryIndex || 0;
            } else if (hashRoute) {
                route = hashRoute;
            }

            window.history.replaceState({
                courseProgressRoute: getPlainRoute(route),
                appHistoryIndex
            }, "", makeRouteUrl(route));
        }

        window.addEventListener("popstate", event => {
            if (typeof activeImageViewerClose === "function") {
                activeImageViewerClose(true);
                return;
            }

            const historyState = event.state;
            const nextRoute = historyState && historyState.courseProgressRoute ? historyState.courseProgressRoute : routeFromHash();
            const nextIndex = historyState && historyState.appHistoryIndex;

            applyBrowserRoute(nextRoute, nextIndex);
        });

        window.addEventListener("hashchange", () => {
            const hashRoute = routeFromHash();
            if (!hashRoute) return;
            applyBrowserRoute(hashRoute, appHistoryIndex > 0 ? appHistoryIndex - 1 : 0);
        });

        function goAppBack(fallbackRoute) {
            const fallback = fallbackRoute ? getPlainRoute(fallbackRoute) : (route.returnRoute || defaultBackRoute());

            if (appHistoryIndex > 0 && window.history) {
                const beforeBack = routeSignature(route);
                window.history.back();

                setTimeout(() => {
                    if (routeSignature(route) === beforeBack) {
                        setRoute(fallback, { replaceHistory: true });
                    }
                }, 260);

                return;
            }

            setRoute(fallback, { replaceHistory: true });
        }

        function getPlainRoute(target) {
            return {
                page: target.page || "home",
                courseId: target.courseId || null,
                chapterId: target.chapterId || null,
                pointId: target.pointId || null,
                exampleId: target.exampleId || null,
                returnRoute: target.returnRoute || null
            };
        }

        function routeCode(target) {
            return `setRoute(${JSON.stringify(getPlainRoute(target))})`;
        }

        function currentRouteAsReturn() {
            return getPlainRoute({ page: route.page, courseId: route.courseId, chapterId: route.chapterId, pointId: route.pointId, exampleId: route.exampleId });
        }

        function defaultBackRoute() {
            if (route.page === "course") return { page: "home", courseId: null, chapterId: null, pointId: null };
            if (route.page === "chapter") return { page: "course", courseId: route.courseId, chapterId: null, pointId: null };
            if (route.page === "addChapter") return { page: "course", courseId: route.courseId, chapterId: null, pointId: null };
            if (route.page === "addPoint") return { page: "chapter", courseId: route.courseId, chapterId: route.chapterId, pointId: null };
            if (route.page === "addExample") return { page: "viewPoint", courseId: route.courseId, chapterId: route.chapterId, pointId: route.pointId, exampleId: null };
            if (route.page === "editExample") return { page: "viewPoint", courseId: route.courseId, chapterId: route.chapterId, pointId: route.pointId, exampleId: null };
            if (route.page === "viewExample") return { page: "viewPoint", courseId: route.courseId, chapterId: route.chapterId, pointId: route.pointId, exampleId: null };
            if (route.page === "viewPoint") return { page: "chapter", courseId: route.courseId, chapterId: route.chapterId, pointId: null, exampleId: null };
            if (route.page === "editPoint") return { page: "chapter", courseId: route.courseId, chapterId: route.chapterId, pointId: null };
            if (route.page === "editChapter") return { page: "course", courseId: route.courseId, chapterId: null, pointId: null };
            return { page: "home", courseId: null, chapterId: null, pointId: null };
        }

        function backButtonHtml() {
            if (route.page === "home") return "";
            return `<button class="btn btn-back" onclick="goAppBack()">← 返回上一级</button>`;
        }

        function goBackAfterEdit() {
            goAppBack(route.returnRoute || defaultBackRoute());
        }

        function handleMenuClick(event, summaryElement) {
            event.preventDefault();
            event.stopPropagation();

            const currentMenu = summaryElement.closest(".more-menu");
            const currentList = currentMenu.querySelector(".more-menu-list");
            const isOpen = currentMenu.hasAttribute("open");

            document.querySelectorAll(".more-menu[open]").forEach(menu => {
                menu.removeAttribute("open");
                const list = menu.querySelector(".more-menu-list");
                if (list) list.classList.remove("menu-pop");
                const layerCard = menu.closest(".example-display-card, .note-card, .card");
                if (layerCard) layerCard.classList.remove("menu-layer-active");
            });

            const currentLayerCard = currentMenu.closest(".example-display-card, .note-card, .card");
            if (isOpen) {
                if (currentLayerCard) currentLayerCard.classList.remove("menu-layer-active");
                return;
            }

            if (currentLayerCard) currentLayerCard.classList.add("menu-layer-active");
            currentMenu.setAttribute("open", "");
            if (!currentList) return;

            currentList.classList.remove("menu-pop");
            currentList.style.animation = "none";
            void currentList.offsetWidth;
            currentList.style.animation = "";
            currentList.classList.add("menu-pop");
            currentList.addEventListener("animationend", () => {
                currentList.classList.remove("menu-pop");
            }, { once: true });
        }

        function moreMenuHtml(buttonsHtml) {
            return `<details class="more-menu"><summary class="btn btn-more" title="更多操作" onclick="handleMenuClick(event, this)">...</summary><div class="more-menu-list">${buttonsHtml}</div></details>`;
        }

function showCenterModal(options) {
    const {
        title = "提示",
        message = "",
        confirmText = "确定",
        cancelText = "取消",
        showCancel = false,
        danger = false
    } = options;

    return new Promise(resolve => {
        const oldModal = document.querySelector(".modal-overlay");
        if (oldModal) oldModal.remove();

        const overlay = document.createElement("div");
        overlay.className = "modal-overlay";

        overlay.innerHTML = `
            <section class="modal-card ${danger ? "modal-danger" : ""}" role="dialog" aria-modal="true">
                <h3>${escapeHtml(title)}</h3>
                <p>${escapeHtml(message)}</p >
                <div class="modal-actions">
                    ${showCancel ? `<button class="btn" data-action="cancel">${escapeHtml(cancelText)}</button>` : ""}
                    <button class="btn ${danger ? "btn-danger" : "btn-primary"}" data-action="confirm">${escapeHtml(confirmText)}</button>
                </div>
            </section>
        `;

        document.body.appendChild(overlay);

        const close = result => {
            overlay.remove();
            resolve(result);
        };

        overlay.querySelector("[data-action='confirm']").onclick = () => close(true);

        const cancelBtn = overlay.querySelector("[data-action='cancel']");
        if (cancelBtn) cancelBtn.onclick = () => close(false);

        overlay.onclick = event => {
            if (event.target === overlay && showCancel) close(false);
        };
    });
}

function showNotice(title, message) {
    return showCenterModal({
        title,
        message,
        confirmText: "知道了",
        showCancel: false
    });
}

function showUsageNotice() {
    const oldModal = document.querySelector(".modal-overlay");
    if (oldModal) oldModal.remove();

    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
        <section class="modal-card usage-modal-card" role="dialog" aria-modal="true" aria-labelledby="usageNoticeTitle">
            <div class="usage-modal-header">
                <h3 id="usageNoticeTitle">使用须知</h3>
            </div>

            <div class="usage-modal-body">
                <div class="usage-notice">
                    <ol>
                        <li><strong>基本结构：</strong>这个网页按“课程 → 课程目录 → 知识点”三级来记录。先在主页添加课程，再进入课程添加目录，最后进入目录添加知识点。</li>
                        <li><strong>添加内容：</strong>主页点“添加课程”；课程页点“添加课程目录”；目录页点“添加知识点记录”。知识点正文可以写公式、错因、题型、复习提醒等内容。</li>

function requestFocusItem(id) {
    pendingFocusItem = id ? String(id) : null;
}

function focusPendingItem() {
    if (!pendingFocusItem) return;

    const id = pendingFocusItem;
    const safeId = String(id).replaceAll("\\", "\\\\").replaceAll('"', '\\"');
    const target = document.querySelector(`[data-focus-id="${safeId}"]`);
    if (!target) return;

    pendingFocusItem = null;
    setTimeout(() => {
        try {
            target.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (error) {
            target.scrollIntoView();
        }

        target.classList.add("newly-added-highlight");
        setTimeout(() => target.classList.remove("newly-added-highlight"), 1700);
    }, 80);
}

function scrollPointContentTo(targetId) {
    const content = document.querySelector("#pointViewContent");
    const target = document.getElementById(targetId);
    if (!target) return;

    const scrollWindowToTarget = () => {
        try {
            target.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (error) {
            target.scrollIntoView();
        }
        flashPointAnchor(target);
    };

    if (content && content.contains(target)) {
        const canScrollInside = content.scrollHeight > content.clientHeight + 4;

        if (!canScrollInside) {
            scrollWindowToTarget();
            return;
        }

        try {
            content.scrollIntoView({ behavior: "smooth", block: "center" });
        } catch (error) {
            content.scrollIntoView();
        }

        const contentRect = content.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const top = content.scrollTop + targetRect.top - contentRect.top - 10;

        try {
            content.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
        } catch (error) {
            content.scrollTop = Math.max(0, top);
        }
        flashPointAnchor(target);
        return;
    }

    scrollWindowToTarget();
}

function flashPointAnchor(target) {
    if (!target || !target.classList) return;
    target.classList.remove("quick-nav-flash");
    void target.offsetWidth;
    target.classList.add("quick-nav-flash");
    window.setTimeout(() => target.classList.remove("quick-nav-flash"), 700);
}


        function escapeJsString(value) {

        }

        function searchBoxHtml(id, placeholder, items) {

            const rows = safeItems.map(item => {

                        ${item.meta ? `<span>${escapeHtml(item.meta)}</span>` : ""}

            }).join("");

            return `
                <div class="page-search" id="searchBox_${escapeHtml(id)}">
                    <input
                        class="page-search-input"

                        type="text"
                        placeholder="${escapeHtml(placeholder)}"
                        autocomplete="off"
                        onfocus="openSearchList('${escapeJsString(id)}')"
                        onclick="openSearchList('${escapeJsString(id)}')"
                        oninput="filterSearchList('${escapeJsString(id)}')"
                        onkeydown="handleSearchKey(event, '${escapeJsString(id)}')"

                        <div class="search-empty-item" hidden>没有找到匹配名称</div>

                </div>
            `;
        }

        function openSearchList(id) {
            closeSearchLists(id);
            const box = document.querySelector(`#searchBox_${CSS.escape(id)}`);
            if (box) box.classList.add("is-open");
            filterSearchList(id);
        }

        function closeSearchLists(exceptId) {
            document.querySelectorAll(".page-search.is-open").forEach(box => {
                if (exceptId && box.id === `searchBox_${exceptId}`) return;
                box.classList.remove("is-open");
            });
        }

        function filterSearchList(id) {
            const input = document.querySelector(`#searchInput_${CSS.escape(id)}`);
            const list = document.querySelector(`#searchList_${CSS.escape(id)}`);
            if (!input || !list) return;

            const keyword = input.value.trim().toLowerCase();
            let shown = 0;

            list.querySelectorAll(".search-result-item").forEach(item => {
                const text = item.getAttribute("data-search-text") || "";
                const visible = !keyword || text.includes(keyword);
                item.hidden = !visible;
                if (visible) shown += 1;
            });

            const empty = list.querySelector(".search-empty-item");
            if (empty) empty.hidden = shown !== 0;
        }

        function handleSearchKey(event, id) {
            if (event.key !== "Enter") return;
            const list = document.querySelector(`#searchList_${CSS.escape(id)}`);
            const first = list && Array.from(list.querySelectorAll(".search-result-item")).find(item => !item.hidden);
            if (first) {
                event.preventDefault();
                first.click();
            }
        }

        document.addEventListener("click", event => {
            if (event.target && event.target.closest && event.target.closest(".page-search")) return;
            closeSearchLists();
        });

        function focusSearchItem(id) {
            closeSearchLists();
            requestFocusItem(id);
            focusPendingItem();
        }

        function openImageFromElement(imageElement) {
    if (!imageElement) return;

    const payloadText = imageElement.getAttribute("data-image-payload");

    if (payloadText) {
        try {
            const imageObject = JSON.parse(decodeURIComponent(payloadText));
            openImageViewer(imageObject);
            return;
        } catch (error) {
            console.warn("图片信息解析失败，改用缩略图预览：", error);
        }
    }

    const src = imageElement.getAttribute("data-image-src") || imageElement.src;
    const name = imageElement.getAttribute("data-image-name") || imageElement.alt || "图片";
    const fileName = imageElement.getAttribute("data-image-file-name") || "";

    openImageViewer({
        name,
        fileName,
        data: src,
        thumbData: src,
        hasFullImage: Boolean(fileName)
    });
}

        async function openImageViewer(imageOrSrc, name) {
    let imageObject = null;

    if (imageOrSrc && typeof imageOrSrc === "object") {
        imageObject = imageOrSrc;
    } else {
        imageObject = {
            name: name || "图片",
            data: imageOrSrc || "",
            thumbData: imageOrSrc || "",
            fileName: ""
        };
    }

    const title = imageObject.name || name || "图片";
    const thumbSrc = getImageThumbData(imageObject);

    if (!thumbSrc) return;

    const oldViewer = document.querySelector(".image-viewer-overlay");

    if (oldViewer) oldViewer.remove();

    if (typeof activeImageViewerClose === "function") {
        activeImageViewerClose(true);
    }

    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let dragging = false;
    let startX = 0;
    let startY = 0;
    let startTranslateX = 0;
    let startTranslateY = 0;
    let viewerHistoryPushed = false;

    const overlay = document.createElement("div");
    overlay.className = "image-viewer-overlay";

    overlay.innerHTML = `
        <div class="image-viewer-topbar">
            <div class="image-viewer-title">${escapeHtml(title)}</div>
            <div class="image-viewer-controls">
                <button class="image-viewer-btn" type="button" data-action="zoom-out">－</button>
                <button class="image-viewer-btn" type="button" data-action="reset">适应</button>
                <button class="image-viewer-btn" type="button" data-action="zoom-in">＋</button>
                <button class="image-viewer-close" type="button" data-action="close">关闭</button>
            </div>
        </div>
        <div class="image-viewer-stage">
            <img src="${escapeHtml(thumbSrc)}" alt="${escapeHtml(title)}" draggable="false" />
            <div class="image-viewer-tip">正在加载原图...</div>
        </div>
    `;

    const previousOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    document.body.appendChild(overlay);

    const image = overlay.querySelector("img");
    const tip = overlay.querySelector(".image-viewer-tip");

    function applyTransform() {
        image.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function resetTransform() {
        scale = 1;
        translateX = 0;
        translateY = 0;
        applyTransform();
    }

    function closeViewer(skipHistoryBack = false) {
        releaseImagePreviewSource();

        if (overlay.parentNode) {
            overlay.remove();
        }

        document.body.style.overflow = previousOverflow;

        window.removeEventListener("keydown", handleKeyDown);
        window.removeEventListener("mousemove", handleMouseMove);
        window.removeEventListener("mouseup", handleMouseUp);

        activeImageViewerClose = null;

        if (!skipHistoryBack && viewerHistoryPushed && history.state && history.state.imageViewer) {
            history.back();
        }
    }

    function handleKeyDown(event) {
        if (event.key === "Escape") {
            closeViewer();
        }
    }

    function handleMouseMove(event) {
        if (!dragging) return;

        translateX = startTranslateX + event.clientX - startX;
        translateY = startTranslateY + event.clientY - startY;

        applyTransform();
    }

    function handleMouseUp() {
        dragging = false;
        image.classList.remove("is-dragging");
    }

    activeImageViewerClose = closeViewer;

    overlay.addEventListener("click", event => {
        if (event.target === overlay) {
            closeViewer();
        }
    });

    overlay.querySelector('[data-action="close"]').addEventListener("click", () => closeViewer());

    overlay.querySelector('[data-action="zoom-out"]').addEventListener("click", () => {
        scale = Math.max(0.25, scale / 1.2);
        applyTransform();
    });

    overlay.querySelector('[data-action="zoom-in"]').addEventListener("click", () => {
        scale = Math.min(8, scale * 1.2);
        applyTransform();
    });

    overlay.querySelector('[data-action="reset"]').addEventListener("click", resetTransform);

    overlay.addEventListener("wheel", event => {
        event.preventDefault();

        const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;

        scale = Math.max(0.25, Math.min(8, scale * factor));
        applyTransform();
    }, { passive: false });

    image.addEventListener("mousedown", event => {
        event.preventDefault();

        dragging = true;
        startX = event.clientX;
        startY = event.clientY;
        startTranslateX = translateX;
        startTranslateY = translateY;

        image.classList.add("is-dragging");
    });

    image.addEventListener("dblclick", () => {
        if (scale === 1) {
            scale = 2;
        } else {
            resetTransform();
            return;
        }

        applyTransform();
    });

    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("mousemove", handleMouseMove);
    window.addEventListener("mouseup", handleMouseUp);

    if (!(history.state && history.state.imageViewer)) {
        history.pushState({ imageViewer: true }, "");
        viewerHistoryPushed = true;
    }

    applyTransform();

    try {
        const fullSrc = await getImageFullData(imageObject);

        if (overlay.parentNode && fullSrc) {
            image.src = fullSrc;
        }
    } catch (error) {
        console.warn("原图加载失败，继续使用缩略图：", error);
    } finally {
        if (tip && tip.parentNode) {
            tip.remove();
        }
    }
}

        function loadScreenshotShortcut() {
            try {
                const saved = JSON.parse(localStorage.getItem(SCREENSHOT_SHORTCUT_STORAGE_KEY) || "null");
                if (saved && saved.key) return saved;
            } catch (error) {
                console.warn("读取截图快捷键失败：", error);
            }
            return { ctrl: true, alt: false, shift: true, key: "X" };
        }

        function saveScreenshotShortcut() {
            try {
                localStorage.setItem(SCREENSHOT_SHORTCUT_STORAGE_KEY, JSON.stringify(screenshotShortcut));
            } catch (error) {
                console.warn("保存截图快捷键失败：", error);
            }
        }

        function shortcutLabel(shortcut = screenshotShortcut) {
            const parts = [];
            if (shortcut.ctrl) parts.push("Ctrl");
            if (shortcut.alt) parts.push("Alt");
            if (shortcut.shift) parts.push("Shift");
            parts.push(String(shortcut.key || "X").toUpperCase());
            return parts.join(" + ");
        }

        function isScreenshotShortcut(event) {
            if (!screenshotShortcut || !screenshotShortcut.key) return false;
            return Boolean(event.ctrlKey) === Boolean(screenshotShortcut.ctrl)
                && Boolean(event.altKey) === Boolean(screenshotShortcut.alt)
                && Boolean(event.shiftKey) === Boolean(screenshotShortcut.shift)
                && String(event.key || "").toUpperCase() === String(screenshotShortcut.key || "").toUpperCase();
        }

        function getCurrentScreenshotKey() {
            if (route.page === "addExample") return "newExampleImages";
            if (route.page === "editExample") return "editExampleImages";
            return null;
        }

        document.addEventListener("keydown", event => {
            if (waitingForScreenshotShortcut) {
                if (["Control", "Shift", "Alt", "Meta"].includes(event.key)) return;
                event.preventDefault();
                screenshotShortcut = {
                    ctrl: Boolean(event.ctrlKey),
                    alt: Boolean(event.altKey),
                    shift: Boolean(event.shiftKey),
                    key: String(event.key || "X").toUpperCase()
                };
                saveScreenshotShortcut();
                waitingForScreenshotShortcut = false;
                updateScreenshotShortcutLabels();
                return;
            }

            const key = getCurrentScreenshotKey();
            if (!key) return;
            if (!isScreenshotShortcut(event)) return;
            event.preventDefault();
            captureExampleScreenshot(key);
        });

        function startScreenshotShortcutSetting() {
            waitingForScreenshotShortcut = true;
            updateScreenshotShortcutLabels("请按新的快捷键组合");
        }

        function updateScreenshotShortcutLabels(text) {
            const label = text || `当前快捷键：${shortcutLabel()}`;
            document.querySelectorAll(".shortcut-label").forEach(item => item.textContent = label);
        }

        function renderPendingScreenshotPreview(key) {
            const images = pendingExampleScreenshots[key] || [];
            if (!images.length) return "";
            return `
                <div class="screenshot-preview-title">待保存截图</div>
                <div class="screenshot-preview-grid">
                    ${images.map(image => `

        async function captureFrameFromStream(stream) {
            return new Promise((resolve, reject) => {
                const video = document.createElement("video");
                video.muted = true;
                video.autoplay = true;
                video.playsInline = true;
                video.srcObject = stream;

                const cleanup = () => {
                    stream.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                };

                video.onloadedmetadata = async () => {
                    try {
                        await video.play();
                        await wait(160);
                        const canvas = document.createElement("canvas");
                        canvas.width = video.videoWidth || 1280;
                        canvas.height = video.videoHeight || 720;
                        const context = canvas.getContext("2d");
                        if (!context) throw new Error("无法创建截图画布");
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const raw = canvas.toDataURL("image/png");
                        cleanup();
                        resolve(raw);
                    } catch (error) {
                        cleanup();
                        reject(error);
                    }
                };

                video.onerror = () => {
                    cleanup();
                    reject(new Error("截图视频流读取失败"));
                };
            });
        }

        function cropScreenshotDataUrl(rawData) {
            return new Promise(resolve => {
                const overlay = document.createElement("div");
                overlay.className = "screenshot-crop-overlay";
                overlay.innerHTML = `
                    <div class="screenshot-crop-head">
                        <div>
                            <div class="screenshot-crop-title">选择截图区域</div>
                            <div class="screenshot-crop-hint">拖动鼠标框选要保存的区域；不框选时可以直接保存整张截图。</div>
                        </div>
                    </div>
                    <div class="screenshot-crop-stage">
                        <img src="${escapeHtml(rawData)}" alt="待裁剪截图" draggable="false" />
                        <div class="screenshot-crop-selection"></div>
                    </div>
                    <div class="screenshot-crop-actions">
                        <button type="button" class="btn" data-action="cancel">取消</button>
                        <button type="button" class="btn" data-action="full">保存整张</button>
                        <button type="button" class="btn btn-primary" data-action="crop">保存选区</button>
                    </div>
                `;

                document.body.appendChild(overlay);

                const stage = overlay.querySelector(".screenshot-crop-stage");
                const image = overlay.querySelector("img");
                const selection = overlay.querySelector(".screenshot-crop-selection");
                let start = null;
                let rect = null;
                let dragging = false;

                const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
                const imageRect = () => image.getBoundingClientRect();

                const pointInImage = event => {
                    const bounds = imageRect();
                    return {
                        x: clamp(event.clientX - bounds.left, 0, bounds.width),
                        y: clamp(event.clientY - bounds.top, 0, bounds.height),
                        bounds
                    };
                };

                const updateSelection = (a, b) => {
                    const bounds = imageRect();
                    const left = Math.min(a.x, b.x);
                    const top = Math.min(a.y, b.y);
                    const width = Math.abs(a.x - b.x);
                    const height = Math.abs(a.y - b.y);
                    rect = { left, top, width, height, displayWidth: bounds.width, displayHeight: bounds.height };
                    selection.style.display = width > 4 && height > 4 ? "block" : "none";
                    selection.style.left = `${bounds.left - stage.getBoundingClientRect().left + left}px`;
                    selection.style.top = `${bounds.top - stage.getBoundingClientRect().top + top}px`;
                    selection.style.width = `${width}px`;
                    selection.style.height = `${height}px`;
                };

                stage.addEventListener("pointerdown", event => {
                    event.preventDefault();
                    dragging = true;
                    start = pointInImage(event);
                    updateSelection(start, start);
                    stage.setPointerCapture(event.pointerId);
                });

                stage.addEventListener("pointermove", event => {
                    if (!dragging || !start) return;
                    event.preventDefault();
                    updateSelection(start, pointInImage(event));
                });

                const endDrag = event => {
                    if (!dragging) return;
                    dragging = false;
                    try { stage.releasePointerCapture(event.pointerId); } catch (error) {}
                };

                stage.addEventListener("pointerup", endDrag);
                stage.addEventListener("pointercancel", endDrag);

                const close = result => {
                    overlay.remove();
                    resolve(result);
                };

                const cropToDataUrl = () => {
                    if (!rect || rect.width < 8 || rect.height < 8) return rawData;
                    const canvas = document.createElement("canvas");
                    const ratioX = image.naturalWidth / rect.displayWidth;
                    const ratioY = image.naturalHeight / rect.displayHeight;
                    const sx = Math.round(rect.left * ratioX);
                    const sy = Math.round(rect.top * ratioY);
                    const sw = Math.round(rect.width * ratioX);
                    const sh = Math.round(rect.height * ratioY);
                    canvas.width = Math.max(1, sw);
                    canvas.height = Math.max(1, sh);
                    const context = canvas.getContext("2d");
                    if (!context) return rawData;
                    context.drawImage(image, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
                    return canvas.toDataURL("image/png");
                };

                overlay.querySelector('[data-action="cancel"]').onclick = () => close(null);
                overlay.querySelector('[data-action="full"]').onclick = () => close(rawData);
                overlay.querySelector('[data-action="crop"]').onclick = () => close(cropToDataUrl());
            });
        }

        async function captureScreenshotWithBrowser(shouldHide) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                throw new Error("当前环境不支持屏幕捕获");
            }

            let cover = null;
            try {
                if (shouldHide) {
                    cover = document.createElement("div");
                    cover.className = "capture-hide-cover";
                    cover.textContent = "正在截图，当前页面已临时隐藏";
                    document.body.appendChild(cover);
                    document.body.classList.add("capture-hide");
                    await wait(180);
                }

                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                return await captureFrameFromStream(stream);
            } finally {
                document.body.classList.remove("capture-hide");
                if (cover) cover.remove();
            }
        }

        async function captureExampleScreenshot(key) {
            const hideCheckbox = document.querySelector(`#${CSS.escape(key)}_hidePage`);
            const shouldHide = Boolean(hideCheckbox && hideCheckbox.checked);

            try {
                const rawData = isElectronDesktopApp()
                    ? await captureScreenshotWithElectron(shouldHide)
                    : await captureScreenshotWithBrowser(shouldHide);

                if (!rawData) return;

                const selectedData = isElectronDesktopApp() ? rawData : await cropScreenshotDataUrl(rawData);
                if (!selectedData) return;

                const data = await compressImageDataUrl(selectedData);
                const image = await createStoredExampleImage({
                    id: createId(),
                    name: `截图-${new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19)}.jpg`,
                    data
                });
                pendingExampleScreenshots[key].push(image);
                refreshPendingScreenshotPreview(key);
            } catch (error) {
                console.warn("截图上传失败：", error);
                if (error && error.name === "NotAllowedError") return;
                showNotice("截图失败", isElectronDesktopApp()
                    ? "没有完成截图。可以重新点击“截图上传”，或改用普通图片上传。"

        function getSafeExamples(point) {
            if (!Array.isArray(point.examples)) point.examples = [];

        function getExample(point, exampleId) {
            const examples = getSafeExamples(point);
            return examples.find(example => example.id === exampleId);

        function getNextExampleTitle(examples) {
            const usedNumbers = new Set();
            examples.forEach(example => {
                const match = String(example.title || "").match(/^例题(\d+)$/);
                if (match) usedNumbers.add(Number(match[1]));
            });

            let index = 1;
            while (usedNumbers.has(index)) index += 1;
            return `例题${index}`;
        }

        function getExampleSummary(example) {
            const text = String(example.content || "").trim().replace(/\s+/g, " ");
            const imageCount = Array.isArray(example.images) ? example.images.length : 0;

            if (text && imageCount) return `${text.slice(0, 28)}${text.length > 28 ? "…" : ""}；${imageCount} 张图片`;
            if (text) return text.slice(0, 36) + (text.length > 36 ? "…" : "");
            if (imageCount) return `${imageCount} 张图片`;
            return "暂无内容，点击展开后填写文本或上传图片";
